spring.application.name=ticketing
server.port=${SERVER_PORT:8084}

# Load optional project-root .env for local development
spring.config.import=optional:file:../../.env[.properties]

# OIDC discovery URL used to resolve issuer + jwks_uri
security.oidc.discovery-url=${SUPABASE_OIDC_DISCOVERY_URL:}

# --- Database Configuration ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticketing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.locations=classpath:db/migration

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Ticketing consumer (queue from backend/infrastructure/definitions.json)
ticketing.rabbitmq.event-created-queue=${TICKETING_RABBITMQ_EVENT_CREATED_QUEUE:user.event.created}
