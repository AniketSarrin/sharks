name: sharks

# Ticketing API + shared backend infra (from ../docker-compose.yml).
# From this folder: docker compose up -d --build

include:
  - path: ../docker-compose.yml

services:
  ticketing:
    build: .
    networks:
      - sharks-infra
    depends_on:
      ticketing-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${TICKETING_SERVICE_PORT:-8084}:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://ticketing-postgres:5432/ticketing
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # OIDC discovery endpoint used to resolve issuer and JWKS for token verification
      SUPABASE_OIDC_DISCOVERY_URL: ${SUPABASE_OIDC_DISCOVERY_URL:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
