apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: sharks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth
      containers:
        - name: auth
          # Replace ACCOUNT_ID and REGION with your ECR repository URI components.
          image: 111111111111.dkr.ecr.us-east-1.amazonaws.com/sharks/auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-supabase-secret
                  key: supabase-url
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-supabase-secret
                  key: supabase-anon-key
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-supabase-secret
                  key: supabase-service-role-key
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-supabase-secret
                  key: datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-supabase-secret
                  key: datasource-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-supabase-secret
                  key: datasource-password
            - name: RABBITMQ_HOST
              value: rabbitmq.sharks.svc.cluster.local
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sharks-infra-creds
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sharks-infra-creds
                  key: rabbitmq-password
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
