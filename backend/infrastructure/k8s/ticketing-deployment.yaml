apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing
  namespace: sharks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticketing
  template:
    metadata:
      labels:
        app: ticketing
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ticketing
      containers:
        - name: ticketing
          # Replace ACCOUNT_ID and REGION with your ECR repository URI components.
          image: 111111111111.dkr.ecr.us-east-1.amazonaws.com/sharks/ticketing:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://ticketing-postgres:5432/ticketing
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sharks-infra-creds
                  key: postgres-password
            - name: SUPABASE_OIDC_DISCOVERY_URL
              valueFrom:
                secretKeyRef:
                  name: sharks-app-creds
                  key: supabase-oidc-discovery-url
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sharks-infra-creds
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sharks-infra-creds
                  key: rabbitmq-password
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
