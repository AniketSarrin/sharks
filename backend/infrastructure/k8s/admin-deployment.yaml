apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: sharks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: admin
      containers:
        - name: admin
          # Replace ACCOUNT_ID and REGION with your ECR repository URI components.
          image: 111111111111.dkr.ecr.us-east-1.amazonaws.com/sharks/admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://user-postgres:5432/sharks
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sharks-infra-creds
                  key: postgres-password
            - name: SUPABASE_OIDC_DISCOVERY_URL
              valueFrom:
                secretKeyRef:
                  name: sharks-app-creds
                  key: supabase-oidc-discovery-url
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
