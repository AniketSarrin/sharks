# Matches docker-compose defaults. Replace with AWS Secrets Manager / External Secrets for production.
apiVersion: v1
kind: Secret
metadata:
  name: sharks-infra-creds
  namespace: sharks
type: Opaque
stringData:
  postgres-password: postgres
  rabbitmq-username: guest
  rabbitmq-password: guest
---
# Application secrets (replace values before production deploy).
# Populate before applying — Supabase Storage credentials are required for the
# events service to upload event cover images to the S3-compatible bucket.
apiVersion: v1
kind: Secret
metadata:
  name: sharks-app-creds
  namespace: sharks
type: Opaque
stringData:
  supabase-oidc-discovery-url: ""
  # Supabase Storage S3 endpoint, e.g. https://<project-ref>.storage.supabase.co/storage/v1/s3
  supabase-storage-url: ""
  supabase-storage-bucket: "event-images"
  supabase-storage-access-key: ""
  supabase-storage-secret-key: ""
