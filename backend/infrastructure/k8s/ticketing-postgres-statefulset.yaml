apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ticketing-postgres
  namespace: sharks
spec:
  serviceName: ticketing-postgres
  replicas: 1
  selector:
    matchLabels:
      app: ticketing-postgres
  template:
    metadata:
      labels:
        app: ticketing-postgres
    spec:
      securityContext:
        fsGroup: 70
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ticketing-postgres
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: ticketing
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sharks-infra-creds
                  key: postgres-password
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d ticketing"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d ticketing"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: sharks-gp3
        resources:
          requests:
            storage: 1Gi
