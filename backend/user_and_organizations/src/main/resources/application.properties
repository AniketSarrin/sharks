spring.application.name=user

# Matches gateway gateway.service.user-uri when running locally; Docker sets SERVER_PORT=8080 (see docker-compose.yml).
server.port=${SERVER_PORT:8081}

# Repo-root .env (team-project-.../.env) — same pattern as backend/events
spring.config.import=optional:file:../../../../.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sharks}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:happyjoy}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false

# Flyway
spring.flyway.locations=classpath:db/migration

# OIDC: fetch .well-known/openid-configuration → issuer + jwks_uri; verify RS*/ES* via JWKS (token kid selects key).
# Set in repo root .env as SUPABASE_OIDC_DISCOVERY_URL (see .env.example at repo root and backend/user_and_organizations/.env.example).
security.oidc.discovery-url=${SUPABASE_OIDC_DISCOVERY_URL:}

# --- RabbitMQ Configuration ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# User service specific RabbitMQ configuration
user.rabbitmq.user-exchange=${USER_RABBITMQ_USER_EXCHANGE:sharks.user}
user.rabbitmq.user-queue=${USER_RABBITMQ_USER_QUEUE:user.user.created}
user.rabbitmq.user-routing-key=${USER_RABBITMQ_USER_ROUTING_KEY:user.created}
