name: sharks

# User & organizations API + shared backend infra (from ../docker-compose.yml).
# From this folder: docker compose up -d --build

include:
  - path: ../docker-compose.yml

services:
  user-and-organizations:
    build: .
    networks:
      - sharks-infra
    depends_on:
      user-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${USER_SERVICE_PORT:-8081}:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-postgres:5432/sharks
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # OIDC discovery (RS*/ES* + JWKS). Must be set in repo root `.env`, this folder's `.env`, or shell.
      SUPABASE_OIDC_DISCOVERY_URL: ${SUPABASE_OIDC_DISCOVERY_URL:?Set SUPABASE_OIDC_DISCOVERY_URL in .env}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
