spring.application.name=admin

# Matches gateway gateway.service.admin-uri when running locally; Docker sets SERVER_PORT=8080 (see docker-compose.yml).
server.port=${SERVER_PORT:8083}

# Same DB as user_and_organizations (user-postgres, database sharks). Repo-root `.env` optional via import.
spring.config.import=optional:file:../../../../.env[.properties]

# OIDC discovery URL used to resolve issuer + jwks_uri (same env var as events/ticketing)
security.oidc.discovery-url=${SUPABASE_OIDC_DISCOVERY_URL:}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sharks}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:happyjoy}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
