# Tests use Testcontainers Postgres; schema is created from entities (prod uses Supabase migrations + ddl-auto=none).
spring.jpa.hibernate.ddl-auto=create-drop

# No broker required for @SpringBootTest
spring.rabbitmq.listener.simple.auto-startup=false

supabase.base-url=https://project-ref.supabase.co
supabase.anon-key=test-anon-key
supabase.service-role-key=test-service-role-key
