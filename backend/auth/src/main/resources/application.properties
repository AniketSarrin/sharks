spring.application.name=auth
server.port=${SERVER_PORT:8085}
# Cloud Supabase Postgres connection is supplied per environment.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Supabase Cloud project API endpoint and keys are required in every environment.
supabase.base-url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# RabbitMQ (backend/docker-compose sets RABBITMQ_*)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Kubernetes readiness/liveness probes (exposes /actuator/health/liveness and /readiness)
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
