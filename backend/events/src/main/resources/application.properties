spring.application.name=event
server.port=${SERVER_PORT:8082}

# Load optional project-root .env for local development
spring.config.import=optional:file:../../.env[.properties]

# OIDC discovery URL used to resolve issuer + jwks_uri
security.oidc.discovery-url=${SUPABASE_OIDC_DISCOVERY_URL:}

# --- Database Configuration ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/events}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false

# Flyway
spring.flyway.locations=classpath:db/migration

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Event service RabbitMQ (publish to sharks.event)
event.rabbitmq.event-exchange=${EVENT_RABBITMQ_EVENT_EXCHANGE:sharks.event}
event.rabbitmq.event-cancelled-routing-key=${EVENT_RABBITMQ_EVENT_CANCELLED_ROUTING_KEY:event.cancelled}
event.rabbitmq.event-created-routing-key=${EVENT_RABBITMQ_EVENT_CREATED_ROUTING_KEY:event.created}

# Supabase Storage (event cover images; events service uploads with service role key)
supabase.storage.url=${SUPABASE_STORAGE_URL:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:event-images}
supabase.storage.access-key=${SUPABASE_STORAGE_ACCESS_KEY:}
supabase.storage.secret-key=${SUPABASE_STORAGE_SECRET_KEY:}

# Multipart limits for event cover image uploads (JPEG). Spring defaults
# (1MB / 10MB) are too small for typical event photos.
spring.servlet.multipart.max-file-size=${EVENT_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${EVENT_MAX_REQUEST_SIZE:12MB}
